name: Build and publish Docker images (main + cuda) to GHCR

on:
  push:
    branches: [ "main" ]   # عدّل الفروع حسب رغبتك
    tags: [ "v*" ]         # يدعم الإصدار عبر التاجات أيضاً
  workflow_dispatch:       # تشغيل يدوي

permissions:
  contents: read
  packages: write          # ضروري للـ push إلى ghcr.io
  # id-token: write        # فعّلها فقط إذا ستستخدم توقيع/سياسات متقدمة

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # يساوي OWNER/REPO تلقائياً
  # لتغيير الاسم (اختياري): IMAGE_NAME: mohammad-alazafa/open-webui

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push (${{ matrix.variant }}) • ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        variant: [ "main", "cuda" ]   # نبني صورتين
        platform: [ "linux/amd64", "linux/arm64" ]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU مطلوب لبناء cross-arch
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # استخدم GHCR_TOKEN إذا أضفت PAT في Secrets. وإلا اترك GITHUB_TOKEN.
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      # توليد وسوم/ليبلز ذكية
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # وسوم عامة
            type=raw,value=git-${{ github.sha }}${{ matrix.variant == 'cuda' && '-cuda' || '' }}
            # عند الدفع إلى main
            type=raw,value=${{ matrix.variant == 'cuda' && 'latest-cuda' || 'latest' }},enable={{is_default_branch}}
            type=raw,value=${{ matrix.variant == 'cuda' && 'cuda' || 'main' }},enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.variant }} image

      # اختياري: استخدم Dockerfile مختلف لـ CUDA إذا كان لديك واحد (مثلاً Dockerfile.cuda)
      # خلاف ذلك، استخدم نفس Dockerfile مع BUILD ARG يفعّل CUDA
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          # إن لديك Dockerfile.cuda أزل التعليق واستخدم السطر التالي:
          # file: ${{ matrix.variant == 'cuda' && 'Dockerfile.cuda' || 'Dockerfile' }}
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # لو كان Dockerfile يدعم تمكين CUDA عبر ARG/target:
          build-args: |
            VARIANT=${{ matrix.variant }}
          # كاش سريع
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.variant }}-${{ matrix.platform }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.variant }}-${{ matrix.platform }},mode=max
