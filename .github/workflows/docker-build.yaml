name: Build & Publish Docker images (main + cuda) to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # id-token: write # فعّلها لاحقًا إذا احتجت توقيع/إثباتات Supply Chain

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push → ${{ matrix.variant }} • ${{ matrix.platforms }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # صورة أساسية متعددة المعماريات
          - variant: main
            platforms: linux/amd64,linux/arm64
            suffix: ""
          # صورة CUDA (amd64 فقط عادة)
          - variant: cuda
            platforms: linux/amd64
            suffix: "-cuda"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
            suffix=${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Select Dockerfile (auto CUDA)
        id: df
        shell: bash
        run: |
          if [[ "${{ matrix.variant }}" == "cuda" && -f Dockerfile.cuda ]]; then
            echo "path=Dockerfile.cuda" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push image
        id: buildpush
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.df.outputs.path }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=${{ matrix.variant }}
          # كاش سريع ومجاني على Actions — بدون شرطات مائلة في الاسم
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.variant }}
          provenance: false

      - name: Inspect pushed image (manifest)
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.buildpush.outputs.digest }}
